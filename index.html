<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>מסע ה-AI שלי | קורס AI ליועצים ארגוניים</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ── Reset & base ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{
  background:#21052F;
  color:#F7F5FA;
  font-family:'Heebo','Arial Hebrew',Arial,sans-serif;
  font-size:15px;
  line-height:1.6;
  direction:rtl;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-weight:700;line-height:1.3}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,textarea{font-family:inherit}
textarea{resize:vertical}

/* ── Brand tokens ─────────────────────────────────── */
:root{
  --mint:#0BFCCE;
  --violet:#500B75;
  --bone:#F7F5FA;
  --v900:#21052F;
  --v800:#2D0940;
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.10);
  --glass-hover:rgba(255,255,255,0.08);
  --radius:12px;
  --mono:'JetBrains Mono','Courier New',monospace;
}

/* ── Scrollbar ─────────────────────────────────────── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.03)}
::-webkit-scrollbar-thumb{background:rgba(11,252,206,0.25);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(11,252,206,0.45)}

/* ── Utility ──────────────────────────────────────── */
.mono{font-family:var(--mono)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--mint);opacity:.8;text-transform:lowercase}
.text-mint{color:var(--mint)}
.text-bone{color:var(--bone)}
.text-dim{color:rgba(247,245,250,.5)}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.hidden{display:none!important}

.fade-in{animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Layout shells ────────────────────────────────── */
#app{min-height:100vh;display:flex;flex-direction:column}
.screen{flex:1;display:flex;flex-direction:column}

/* ── Canvas particles layer ─────────────────────── */
#particle-canvas{
  position:fixed;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* ── Glass card ─────────────────────────────────── */
.card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:20px;
}
.card.glow-border{border-color:rgba(11,252,206,.2)}
.card.dashed{border-style:dashed;background:transparent}

/* ── ═══════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════ */
#login-screen{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:var(--v900);
  position:relative;overflow:hidden;
  z-index:1;
}
.login-glow{
  position:absolute;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(80,11,117,.45) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
.login-box{
  position:relative;z-index:2;
  width:100%;max-width:420px;padding:0 20px;
}
.login-logo{
  text-align:center;margin-bottom:32px;
}
.login-logo-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:60px;height:60px;
  border-radius:16px;
  border:1.5px solid rgba(11,252,206,.3);
  background:rgba(11,252,206,.08);
  margin-bottom:16px;
}
.login-logo h1{font-size:22px;color:var(--bone);margin-bottom:4px}
.login-logo p{font-family:var(--mono);font-size:11px;color:rgba(11,252,206,.65);letter-spacing:.1em}
.login-card{background:rgba(255,255,255,.05);border:1px solid rgba(11,252,206,.2);border-radius:var(--radius);padding:28px}
.login-sub{color:rgba(247,245,250,.55);font-size:13px;text-align:center;margin-bottom:20px}
.field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field-group label{font-size:12px;color:rgba(247,245,250,.6)}
.input-text{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.18);
  border-radius:8px;padding:11px 14px;
  color:var(--bone);font-size:14px;
  font-family:var(--mono);
  outline:none;transition:border-color .2s,box-shadow .2s;
  direction:ltr;text-align:left;
}
.input-text:focus{border-color:rgba(11,252,206,.55);box-shadow:0 0 0 3px rgba(11,252,206,.1)}
.input-text::placeholder{color:rgba(247,245,250,.25)}
.err-msg{color:#fc6868;font-size:12px;margin-top:4px;min-height:16px}
.btn-primary{
  width:100%;padding:13px;border-radius:10px;
  font-size:14px;font-weight:700;font-family:inherit;
  background:linear-gradient(135deg,var(--violet),var(--mint));
  color:var(--v900);transition:transform .15s,box-shadow .15s;
  margin-top:4px;
}
.btn-primary:hover{transform:scale(1.02);box-shadow:0 6px 24px rgba(11,252,206,.25)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.login-divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:20px 0}
.quick-login-label{font-family:var(--mono);font-size:11px;color:rgba(247,245,250,.35);text-align:center;margin-bottom:10px}
.quick-btns{display:flex;gap:8px}
.btn-ghost{
  flex:1;padding:9px 12px;
  border:1px solid rgba(255,255,255,.15);border-radius:8px;
  font-size:12px;color:rgba(247,245,250,.6);
  font-family:inherit;transition:border-color .2s,color .2s;
}
.btn-ghost:hover{border-color:rgba(11,252,206,.4);color:var(--mint)}

/* ── ═══════════════════════════════════════════════
   NAV BAR
══════════════════════════════════════════════════ */
#navbar{
  position:sticky;top:0;z-index:50;
  height:56px;
  background:rgba(33,5,47,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;
}
.nav-tabs{display:flex;gap:4px}
.nav-tab{
  padding:6px 16px;border-radius:8px;
  font-size:13px;font-weight:600;font-family:inherit;
  color:rgba(247,245,250,.5);
  transition:all .2s;
}
.nav-tab:hover{color:rgba(247,245,250,.8)}
.nav-tab.active{
  background:rgba(11,252,206,.12);
  color:var(--mint);
  border:1px solid rgba(11,252,206,.3);
}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{font-size:13px;color:rgba(247,245,250,.45);display:none}
@media(min-width:600px){.nav-user{display:block}}
.btn-logout{font-family:var(--mono);font-size:11px;color:rgba(247,245,250,.35);transition:color .2s}
.btn-logout:hover{color:rgba(247,245,250,.7)}

/* ── ADMIN BANNER ─────────────────────────────────── */
#admin-banner{
  background:rgba(255,170,0,.08);
  border-bottom:1px solid rgba(255,170,0,.15);
  padding:7px 20px;
  font-family:var(--mono);font-size:11px;
  color:rgba(255,180,0,.8);
}
#admin-banner a{color:rgba(255,180,0,.9);text-decoration:underline;cursor:pointer}

/* ── HERO ─────────────────────────────────────────── */
#hero{
  background:var(--v900);padding:48px 24px 40px;
  position:relative;overflow:hidden;
}
#hero::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 25% 50%,rgba(80,11,117,.55) 0%,transparent 60%),
    radial-gradient(ellipse at 75% 50%,rgba(11,252,206,.1) 0%,transparent 55%);
  pointer-events:none;
}
.hero-inner{position:relative;z-index:1;max-width:960px;margin:0 auto}
.hero-eyebrow{font-family:var(--mono);font-size:11px;color:rgba(11,252,206,.55);letter-spacing:.12em;margin-bottom:12px}
#hero h2{font-size:clamp(24px,4vw,38px);color:var(--bone);line-height:1.25;margin-bottom:8px}
#hero h2 span{color:var(--mint)}
#hero p{font-size:16px;color:rgba(247,245,250,.55)}

/* ── MAIN CONTENT ─────────────────────────────────── */
#main-content{flex:1;position:relative;z-index:1}
.page{display:none;animation:fadeIn .3s ease both}
.page.active{display:block}

/* ── SECTION WRAPPER ─────────────────────────────── */
.section-wrap{max-width:960px;margin:0 auto;padding:32px 20px}
.section-block{margin-bottom:32px}
.section-block .eyebrow{display:block;margin-bottom:12px}

/* ── PROFILE HEADER ──────────────────────────────── */
.profile-header{
  display:flex;align-items:center;gap:16px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:20px;
  margin-bottom:28px;
}
.avatar-wrap{flex-shrink:0;position:relative;width:52px;height:52px;}
.avatar-photo{
  width:52px;height:52px;border-radius:12px;object-fit:cover;
  border:1.5px solid rgba(11,252,206,.3);
  display:block;
}
.avatar{
  width:52px;height:52px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;
  background:var(--violet);color:var(--mint);
  border:1.5px solid rgba(11,252,206,.3);
}
.profile-name{font-size:18px;font-weight:700;color:var(--bone)}
.profile-role{font-size:13px;color:rgba(247,245,250,.5);margin-top:2px}

/* ── SURVEY DISPLAY ──────────────────────────────── */
.survey-field{margin-bottom:18px}
.survey-field:last-child{margin-bottom:0}
.field-label{font-family:var(--mono);font-size:11px;color:rgba(247,245,250,.4);margin-bottom:5px}
.field-value{font-size:14px;color:var(--bone)}
.knowledge-bar-wrap{margin-top:8px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.knowledge-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--violet),var(--mint));transition:width 1s ease}
.notes-text{
  font-size:13px;color:rgba(247,245,250,.75);line-height:1.65;
  font-style:italic;
  border-right:2px solid rgba(11,252,206,.3);padding-right:12px;
}

/* ── QUOTE CARDS ─────────────────────────────────── */
.quote-card{background:var(--glass);border:1px solid rgba(11,252,206,.1);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.quote-mark{font-family:var(--mono);font-size:26px;color:rgba(11,252,206,.35);line-height:1;margin-bottom:8px}
.quote-text{font-size:14px;color:rgba(247,245,250,.82);line-height:1.7}

/* ── FORM ─────────────────────────────────────────── */
.form-field{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:700;color:rgba(247,245,250,.75);margin-bottom:8px}
.textarea-input{
  width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;padding:13px 15px;
  color:var(--bone);font-size:14px;font-family:inherit;
  outline:none;transition:border-color .2s,box-shadow .2s;
  min-height:90px;line-height:1.6;
}
.textarea-input:focus{border-color:rgba(11,252,206,.5);box-shadow:0 0 0 3px rgba(11,252,206,.08)}
.textarea-input::placeholder{color:rgba(247,245,250,.22)}
.success-banner{
  background:rgba(11,252,206,.08);
  border:1px solid rgba(11,252,206,.35);
  border-radius:10px;padding:14px 18px;
  color:var(--mint);font-family:var(--mono);font-size:12px;
  text-align:center;margin-bottom:18px;
}
.submitted-field{margin-bottom:16px}
.submitted-label{font-family:var(--mono);font-size:11px;color:rgba(247,245,250,.35);margin-bottom:4px}
.submitted-value{font-size:14px;color:rgba(247,245,250,.82);line-height:1.6;white-space:pre-wrap}
.submitted-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.dot-mint{width:8px;height:8px;border-radius:50%;background:var(--mint);flex-shrink:0}
.edit-link{font-family:var(--mono);font-size:11px;color:rgba(247,245,250,.35);cursor:pointer;margin-top:8px;display:inline-block}
.edit-link:hover{color:var(--mint)}

/* ── COLLECTIVE PAGE ─────────────────────────────── */
.collective-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:680px){.collective-grid{grid-template-columns:1fr}}
.chart-container{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px}
.chart-title{font-size:13px;font-weight:700;color:var(--bone);margin-bottom:16px}
/* Donut */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.donut-legend{display:flex;flex-direction:column;gap:6px;width:100%}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-label{color:rgba(247,245,250,.7);flex:1}
.legend-count{color:var(--mint);font-weight:700;font-family:var(--mono)}
/* Bar chart */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-family:var(--mono);font-size:11px;color:rgba(247,245,250,.65);width:110px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:18px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--violet),var(--mint));transition:width 1.2s ease}
.bar-num{font-family:var(--mono);font-size:12px;color:var(--mint);font-weight:700;width:16px}
/* Word cloud */
.word-cloud{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:8px 0}
.word-chip{
  padding:5px 12px;border-radius:20px;cursor:default;
  transition:border-color .2s,color .2s;
  font-size:var(--chip-size,13px);
}
/* Theme cards */
/* ── 3D MEETING CARDS (upgraded design) ──────── */
.meetings-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1.5rem;
  margin-bottom:8px;
}
@media(max-width:600px){.meetings-grid{grid-template-columns:1fr}}

/* Glass card */
.mcard-wrap{
  background:rgba(20,25,45,0.45);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(100,150,255,.15);
  box-shadow:0 8px 32px rgba(0,0,0,.35);
  border-radius:16px;
  padding:22px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275), box-shadow .4s ease, border-color .4s ease;
  display:block;
}
.mcard-wrap:hover{
  transform:translateY(-8px) scale(1.02);
  border-color:rgba(100,150,255,.4);
  box-shadow:0 15px 40px rgba(0,255,200,.15), 0 0 20px rgba(100,150,255,.2) inset;
}
/* Shimmer sweep */
.mcard-wrap::before{
  content:'';position:absolute;top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(to right,transparent,rgba(255,255,255,.08),transparent);
  transform:skewX(-20deg);transition:.5s;z-index:1;
}
.mcard-wrap:hover::before{left:150%}

/* Glow blob */
.mcard-blob{
  position:absolute;top:0;right:0;
  width:120px;height:120px;border-radius:50%;
  filter:blur(40px);opacity:.15;
  margin:-30px -30px 0 0;
  transition:opacity .4s;pointer-events:none;
}
.mcard-wrap:hover .mcard-blob{opacity:.3}

/* Theme top borders */
.mcard-wrap.t-purple{border-top:3px solid #8b5cf6}
.mcard-wrap.t-blue  {border-top:3px solid #0ea5e9}
.mcard-wrap.t-amber {border-top:3px solid #f59e0b}
.mcard-wrap.t-rose  {border-top:3px solid #e11d48}
.mcard-wrap.t-green {border-top:3px solid #10b981}

/* Float animation */
@keyframes mfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.mcard-float{animation:mfloat 4s ease-in-out infinite}

/* Card icon circle */
.mcard-icon-wrap{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);
}
.t-purple .mcard-icon-wrap{color:#a78bfa;border-color:rgba(139,92,246,.4)}
.t-blue   .mcard-icon-wrap{color:#38bdf8;border-color:rgba(14,165,233,.4)}
.t-amber  .mcard-icon-wrap{color:#fbbf24;border-color:rgba(245,158,11,.4)}
.t-rose   .mcard-icon-wrap{color:#fb7185;border-color:rgba(225,29,72,.4)}
.t-green  .mcard-icon-wrap{color:#34d399;border-color:rgba(16,185,129,.4)}

.mcard-label{
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;
  padding:3px 10px;border-radius:20px;
}
.t-purple .mcard-label{color:#c4b5fd;background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.35)}
.t-blue   .mcard-label{color:#7dd3fc;background:rgba(14,165,233,.2);border:1px solid rgba(14,165,233,.35)}
.t-amber  .mcard-label{color:#fde68a;background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.35)}
.t-rose   .mcard-label{color:#fda4af;background:rgba(225,29,72,.2);border:1px solid rgba(225,29,72,.35)}
.t-green  .mcard-label{color:#6ee7b7;background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.35)}

.mcard-title{font-size:1.25rem;font-weight:700;color:#fff;line-height:1.3;margin:10px 0 4px;transition:color .25s}
.t-purple:hover .mcard-title{color:#c4b5fd}
.t-blue:hover   .mcard-title{color:#7dd3fc}
.t-amber:hover  .mcard-title{color:#fde68a}
.t-rose:hover   .mcard-title{color:#fda4af}
.t-green:hover  .mcard-title{color:#6ee7b7}

.mcard-date{font-size:12px;color:#64748b;display:flex;align-items:center;gap:5px;margin-bottom:16px}
.mcard-footer{border-top:1px solid rgba(255,255,255,.06);padding-top:12px;font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:6px;transition:color .25s}
.mcard-wrap:hover .mcard-footer{color:#fff}
.mcard-arrow{font-size:10px;opacity:0;transform:translateX(4px);transition:all .3s}
.mcard-wrap:hover .mcard-arrow{opacity:1;transform:translateX(0)}
.t-purple:hover .mcard-arrow{color:#a78bfa}
.t-blue:hover   .mcard-arrow{color:#38bdf8}
.t-amber:hover  .mcard-arrow{color:#fbbf24}
.t-rose:hover   .mcard-arrow{color:#fb7185}
.t-green:hover  .mcard-arrow{color:#34d399}

/* Hover summary overlay */
.mcard-summary{
  position:absolute;inset:0;border-radius:16px;
  padding:18px;
  background:rgba(10,5,30,.88);
  backdrop-filter:blur(8px);
  display:flex;flex-direction:column;justify-content:center;
  opacity:0;transform:translateY(8px);
  transition:opacity .25s ease,transform .25s ease;
  pointer-events:none;border:1px solid rgba(100,150,255,.3);
  z-index:5;
}
.mcard-wrap:hover .mcard-summary{opacity:1;transform:translateY(0)}
.mcard-summary-label{font-family:var(--mono);font-size:10px;color:var(--mint);margin-bottom:8px;letter-spacing:.1em}
.mcard-summary-text{font-size:12px;color:rgba(247,245,250,.85);line-height:1.7}

/* ── MEETING MODAL ────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  animation:fadeIn .2s ease;
}
.modal-box{
  background:#1A0428;
  border:1px solid rgba(11,252,206,.3);
  border-radius:18px;
  padding:28px;
  max-width:560px;width:100%;
  max-height:85vh;overflow-y:auto;
  position:relative;
  box-shadow:0 24px 64px rgba(0,0,0,.7), 0 0 40px rgba(11,252,206,.1);
  animation:modalIn .3s cubic-bezier(.22,.68,0,1.2);
}
@keyframes modalIn{from{transform:scale(.92) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-close{

.holo-orb{
  border-radius:50%;
  background:#F7F5FA;
  box-shadow:0 0 10px rgba(255,255,255,.5);
  cursor:pointer;position:relative;
  transition:all .4s cubic-bezier(.175,.885,.32,1.275);
  z-index:30;
  animation:twinkle 3s infinite alternate ease-in-out;
}
.p1 .holo-orb{width:14px;height:14px;animation-delay:.2s}
.p2 .holo-orb{width:18px;height:18px;animation-delay:1.5s}
.p3 .holo-orb{width:24px;height:24px;box-shadow:0 0 20px #fff;animation-delay:.7s}
.p4 .holo-orb{width:16px;height:16px;animation-delay:2.1s}
.p5 .holo-orb{width:30px;height:30px;box-shadow:0 0 28px #fff,0 0 50px var(--mint);animation-delay:1.1s}

  0%{transform:scale(.9);opacity:.6}
  100%{transform:scale(1.15);opacity:1}

.holo-orb:hover{

  animation-play-state:paused;
}

  width:320px;
  opacity:0;visibility:hidden;

  pointer-events:none;
  box-shadow:0 20px 50px rgba(0,0,0,.8),inset 0 0 20px rgba(11,252,206,.04);
  z-index:40;text-align:right;border-radius:2px 2px 12px 12px;

const STORAGE_KEY = 'ai_course_reflections_v2';
function cacheLoad(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return{}} }
function cacheSave(id,r){ const all=cacheLoad(); all[id]=r; localStorage.setItem(STORAGE_KEY,JSON.stringify(all)); }

// Load all reflections from Supabase → cache
async function loadReflections(){
  try {
    const res = await fetch(`${SB_URL}/rest/v1/reflections?select=*`, { headers: SB_HDR });
    if(!res.ok) throw new Error('fetch failed');
    const rows = await res.json();
    const map = {};
    rows.forEach(r => {
      map[r.participant_id] = {
        topTools: r.top_tools, implementation: r.implementation,
        commitment: r.commitment, submittedAt: r.submitted_at
      };
      cacheSave(r.participant_id, map[r.participant_id]);
    });
    return map;
  } catch(e) {
    console.warn('Supabase offline, using cache', e);
    return cacheLoad();
  }
}

// Save one reflection to Supabase + cache
async function saveReflection(participantId, r, participantName){
  cacheSave(participantId, r);
  const payload = {
    participant_id:   participantId,
    participant_name: participantName || '',
    top_tools:        r.topTools,
    implementation:   r.implementation,
    commitment:       r.commitment,
    submitted_at:     r.submittedAt,
    updated_at:       new Date().toISOString(),
    status:           'submitted'
  };
  try {
    // Upsert — insert or update if exists
    const res = await fetch(`${SB_URL}/rest/v1/reflections`, {
      method: 'POST',
      headers: { ...SB_HDR, 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const err = await res.text();
      console.error('Supabase save error:', err);
    }
  } catch(e) {
    console.warn('Supabase save failed, saved to cache only', e);
  }
}

/* ══════════════════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  function init(){
    pts=[];
    for(let i=0;i<85;i++) pts.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.38, vy:(Math.random()-.5)*.38,
      r:Math.random()*1.8+.7, a:Math.random()*.45+.2
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let p of pts){ p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1; }
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){ ctx.beginPath(); ctx.strokeStyle=`rgba(11,252,206,${(1-d/130)*.18})`; ctx.lineWidth=.4; ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke(); }
      }
    }
    for(let p of pts){
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
      g.addColorStop(0,`rgba(11,252,206,${p.a})`); g.addColorStop(1,'rgba(11,252,206,0)');
      ctx.beginPath(); ctx.fillStyle=g; ctx.arc(p.x,p.y,p.r*4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.fillStyle=`rgba(11,252,206,${p.a})`; ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize',()=>{resize();init();});
})();

  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  // Admin (מנחה)
  if(email.toLowerCase() === 'inbalnl@ptc-s.com'){
    const normalize = s => s.replace(/\D/g,'').replace(/^0/,'');
    if(normalize(pass) === '524242925' || pass === '0524242925' || pass === '524242925'){
      loginAs('admin'); return;
    }
    errEl.textContent = 'סיסמה שגויה.'; return;
  }

  // Participant
  const p = PARTICIPANTS.find(x => x.email.toLowerCase() === email.toLowerCase());
  if(!p){ errEl.textContent = 'כתובת האימייל לא נמצאה. נסה/י שוב.'; return; }

  // גמישות בהזנת טלפון: מאפשר עם/בלי 0 בתחילה, עם/בלי רווחים ומקפים
  const normalize = s => s.replace(/\D/g,'').replace(/^0/,'');
  const stored = normalize(p.phone || '');

  if(!stored){ loginAs(p); return; }

  if(normalize(pass) === stored || pass === p.phone || '0'+normalize(pass) === p.phone){
    loginAs(p); return;
  }
  errEl.textContent = 'סיסמה שגויה — הכנס/י את מספר הטלפון שלך (כפי שמופיע ללא 0 בהתחלה).';
}

async function buildNavAndRender(){
  const isAdmin = currentUser==='admin';
  const p = adminViewAs || (isAdmin ? null : currentUser);

  // User name in nav
  document.getElementById('nav-user-name').textContent = isAdmin ? 'מנחה' : currentUser.name;

  // Tabs
  const tabs = isAdmin
    ? [{id:'admin',label:'ניהול'},{id:'collective',label:'מסלול ההתפתחות'},{id:'meetings',label:'המסע שעשינו'}]
    : [{id:'journey',label:'המסע האישי שלי'},{id:'collective',label:'מסלול ההתפתחות'},{id:'meetings',label:'המסע שעשינו'}];

  const tabsEl = document.getElementById('nav-tabs');
  tabsEl.innerHTML = tabs.map(t=>`<button class="nav-tab${currentTab===t.id?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');

  // Hero
  const heroEl = document.getElementById('hero');
  if(p && currentTab==='journey'){
    heroEl.classList.remove('hidden');
    const greeting = isFemale(p.name) ? 'ברוכה הבאה' : 'ברוך הבא';
    document.getElementById('hero-greeting').innerHTML = `${greeting}, <span>${p.name}</span>`;
  } else {
    heroEl.classList.add('hidden');
  }

  // Admin banner
  const bannerEl = document.getElementById('admin-banner');
  if(isAdmin && adminViewAs){
    bannerEl.classList.remove('hidden');
    document.getElementById('admin-banner-name').textContent = adminViewAs.name;
  } else {
    bannerEl.classList.add('hidden');
  }

  // Show active page
  ['journey','collective','meetings','admin'].forEach(id=>{
    document.getElementById('page-'+id).classList.remove('active');
  });
  document.getElementById('page-'+currentTab).classList.add('active');

  // Three.js — particle network only on meetings tab
  if(currentTab==='meetings'){ startThreeBackground(); } else{ stopThreeBackground(); }
  // Space scene — only on collective tab
  if(currentTab!=='collective'){ stopSpaceScene(); }

  // Render (all async)
  if(currentTab==='journey' && p) renderJourney(p);
  else if(currentTab==='collective') renderCollective();
  else if(currentTab==='meetings') renderMeetings();
  else if(currentTab==='admin' && isAdmin) renderAdmin();
}

function switchTab(id){
  if(id !== 'journey') adminViewAs=null;
  currentTab=id;
  buildNavAndRender();
}

function viewParticipant(id){
  adminViewAs = PARTICIPANTS.find(p=>p.id===id);
  currentTab='journey';
  buildNavAndRender();
}

/* ══════════════════════════════════════════════════════
   THREE.JS NETWORK BACKGROUND (collective page)
══════════════════════════════════════════════════════ */
let threeRenderer = null, threeAnimId = null;

function startThreeBackground(){
  if(threeRenderer) return; // already running
  const existing = document.getElementById('three-bg');
  if(existing) existing.remove();

  const canvas = document.createElement('canvas');
  canvas.id = 'three-bg';
  canvas.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;z-index:0;pointer-events:none;opacity:.7';
  document.body.insertBefore(canvas, document.body.firstChild);

  const scene    = new THREE.Scene();
  const camera   = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 30;
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  threeRenderer = renderer;

  // Particles
  const N = 120;
  const pos = new Float32Array(N*3);
  for(let i=0;i<N*3;i++) pos[i]=(Math.random()-.5)*100;
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const pts = new THREE.Points(geom, new THREE.PointsMaterial({size:.3,color:0x00ffcc,transparent:true,opacity:.75,blending:THREE.AdditiveBlending}));
  scene.add(pts);

  // Lines
  const lGeom = new THREE.BufferGeometry();
  const lPos  = new Float32Array(N*N*6);
  lGeom.setAttribute('position', new THREE.BufferAttribute(lPos,3));
  const lines = new THREE.LineSegments(lGeom, new THREE.LineBasicMaterial({color:0xbd00ff,transparent:true,opacity:.12}));
  scene.add(lines);

  let mx=0,my=0;
  document.addEventListener('mousemove', e=>{ mx=e.clientX-innerWidth/2; my=e.clientY-innerHeight/2; });

  const clock = new THREE.Clock();
  function loop(){
    threeAnimId = requestAnimationFrame(loop);
    const t = clock.getElapsedTime();
    pts.rotation.y = t*.04; pts.rotation.x = t*.015;

    const p = pos, lp = lPos;
    let li=0; const D=14;
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        const dx=p[i*3]-p[j*3], dy=p[i*3+1]-p[j*3+1], dz=p[i*3+2]-p[j*3+2];
        if(Math.sqrt(dx*dx+dy*dy+dz*dz)<D && li<lp.length/6){
          lp[li*6]=p[i*3];lp[li*6+1]=p[i*3+1];lp[li*6+2]=p[i*3+2];
          lp[li*6+3]=p[j*3];lp[li*6+4]=p[j*3+1];lp[li*6+5]=p[j*3+2];
          li++;
        }
      }
    }
    for(let i=li*6;i<lp.length;i++) lp[i]=0;
    lGeom.attributes.position.needsUpdate=true;
    lines.rotation.copy(pts.rotation);

    camera.position.x += (mx*.001 - camera.position.x)*.05;
    camera.position.y += (-my*.001 - camera.position.y)*.05;
    camera.lookAt(scene.position);
    renderer.render(scene,camera);
  }
  loop();

  window.addEventListener('resize', ()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}

function stopThreeBackground(){
  if(threeAnimId){ cancelAnimationFrame(threeAnimId); threeAnimId=null; }
  if(threeRenderer){ threeRenderer.dispose(); threeRenderer=null; }
  const c=document.getElementById('three-bg'); if(c) c.remove();
}

/* ── SPACE SCENE for Collective page ─────────── */
let spaceRenderer=null, spaceAnimId=null;

function startSpaceScene(){
  const container = document.getElementById('webgl-collective-bg');
  if(!container || spaceRenderer) return;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x010005, 0.001);
  const camera = new THREE.PerspectiveCamera(60, container.offsetWidth/container.offsetHeight, 1, 2000);
  camera.position.z = 400;

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(container.offsetWidth, container.offsetHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  container.appendChild(renderer.domElement);
  spaceRenderer = renderer;

  // Star texture
  const sc = document.createElement('canvas'); sc.width=sc.height=32;
  const sx = sc.getContext('2d');
  const sg = sx.createRadialGradient(16,16,0,16,16,16);
  sg.addColorStop(0,'rgba(255,255,255,1)'); sg.addColorStop(0.2,'rgba(255,255,255,.8)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  sx.fillStyle=sg; sx.fillRect(0,0,32,32);
  const starTex = new THREE.CanvasTexture(sc);

  // Cloud texture
  const cc = document.createElement('canvas'); cc.width=cc.height=128;
  const cx2 = cc.getContext('2d');
  const cg = cx2.createRadialGradient(64,64,0,64,64,64);
  cg.addColorStop(0,'rgba(255,255,255,.8)'); cg.addColorStop(.4,'rgba(255,255,255,.3)'); cg.addColorStop(1,'rgba(0,0,0,0)');
  cx2.fillStyle=cg; cx2.fillRect(0,0,128,128);
  const cloudTex = new THREE.CanvasTexture(cc);

  // Nebula (clouds)
  const NC=1200, ng=new THREE.BufferGeometry();
  const np=new Float32Array(NC*3), nc=new Float32Array(NC*3);
  const cV=new THREE.Color(0x500B75), cD=new THREE.Color(0x21052F), cM=new THREE.Color(0x0BFCCE);
  for(let i=0;i<NC;i++){
    const t=(Math.random()-.5)*2500, sr=Math.random()*400, sa=Math.random()*Math.PI*2;
    np[i*3]=t-Math.cos(sa)*sr+(Math.sin(t*.005)*100);
    np[i*3+1]=t+Math.cos(sa)*sr+(Math.cos(t*.005)*100);
    np[i*3+2]=Math.sin(sa)*sr*1.5;
    const mc=new THREE.Color(), r=Math.random();
    mc.copy(r>.85?cM:r>.4?cV:cD);
    nc[i*3]=mc.r; nc[i*3+1]=mc.g; nc[i*3+2]=mc.b;
  }
  ng.setAttribute('position',new THREE.BufferAttribute(np,3));
  ng.setAttribute('color',new THREE.BufferAttribute(nc,3));
  const dust=new THREE.Points(ng,new THREE.PointsMaterial({size:200,map:cloudTex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,vertexColors:true,opacity:.12}));
  scene.add(dust);

  // Stars
  const SN=8000, sg2=new THREE.BufferGeometry();
  const sp=new Float32Array(SN*3), sc2=new Float32Array(SN*3), ss=new Float32Array(SN);
  for(let i=0;i<SN;i++){
    let t,sx2,sy,sz;
    if(Math.random()>.15){
      t=(Math.random()-.5)*2800; const sr=Math.pow(Math.random(),2)*350, sa=Math.random()*Math.PI*2;
      sx2=-Math.cos(sa)*sr; sy=Math.cos(sa)*sr; sz=Math.sin(sa)*sr;
    } else {
      t=(Math.random()-.5)*3000; sx2=(Math.random()-.5)*2000; sy=(Math.random()-.5)*2000; sz=(Math.random()-.5)*1000-200;
    }
    sp[i*3]=t+sx2; sp[i*3+1]=t+sy; sp[i*3+2]=sz;
    const col=new THREE.Color(0xF7F5FA), rc=Math.random();
    if(rc>.98)col.setHex(0x0BFCCE); else if(rc>.95)col.setHex(0xffbb99); else if(rc>.9)col.setHex(0x99ccff);
    sc2[i*3]=col.r; sc2[i*3+1]=col.g; sc2[i*3+2]=col.b;
    ss[i]=Math.random()*2.5+(Math.random()>.98?6:0);
  }
  sg2.setAttribute('position',new THREE.BufferAttribute(sp,3));
  sg2.setAttribute('color',new THREE.BufferAttribute(sc2,3));
  const stars=new THREE.Points(sg2,new THREE.PointsMaterial({size:3,map:starTex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,vertexColors:true,opacity:.8}));
  scene.add(stars);

  let mx=0,my=0;
  const mouseFn=e=>{mx=(e.clientX-innerWidth/2)*.1; my=(e.clientY-innerHeight/2)*.1;};
  document.addEventListener('mousemove',mouseFn);

  const clock2=new THREE.Clock();
  function loop(){
    spaceAnimId=requestAnimationFrame(loop);
    const t=clock2.getElapsedTime();
    stars.position.x=Math.sin(t*.05)*20; stars.position.y=Math.cos(t*.05)*20;
    dust.position.x=Math.sin(t*.03)*30; dust.position.y=Math.cos(t*.03)*30;
    stars.rotation.z=Math.sin(t*.02)*.05; dust.rotation.z=Math.cos(t*.02)*.05;
    camera.position.x+=(mx*.8-camera.position.x)*.02;
    camera.position.y+=(-my*.8-camera.position.y)*.02;
    camera.lookAt(scene.position);
    renderer.render(scene,camera);
  }
  loop();

  const resFn=()=>{ camera.aspect=container.offsetWidth/container.offsetHeight; camera.updateProjectionMatrix(); renderer.setSize(container.offsetWidth,container.offsetHeight); };
  window.addEventListener('resize',resFn);

  // Cleanup ref
  spaceRenderer._cleanup=()=>{ document.removeEventListener('mousemove',mouseFn); window.removeEventListener('resize',resFn); };
}

function stopSpaceScene(){
  if(spaceAnimId){ cancelAnimationFrame(spaceAnimId); spaceAnimId=null; }
  if(spaceRenderer){ spaceRenderer._cleanup&&spaceRenderer._cleanup(); spaceRenderer.dispose(); spaceRenderer=null; }
}

function drawPhaseConnectors(){
  const svg = document.getElementById('phase-svg');
  if(!svg) return;
  const nodes = document.querySelectorAll('.phase-node');
  if(nodes.length<2) return;
  const rect = svg.getBoundingClientRect();
  let path = '';
  const pts = Array.from(nodes).map(n=>{
    const orb = n.querySelector('.holo-orb');
    const r = orb.getBoundingClientRect();
    return { x: r.left+r.width/2-rect.left, y: r.top+r.height/2-rect.top };
  });
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i], b=pts[i+1];
    // Bezier curve
    const cx1=a.x-(a.x-b.x)*.3, cy1=a.y-(a.y-b.y)*.1;
    const cx2=b.x+(a.x-b.x)*.3, cy2=b.y+(a.y-b.y)*.1;
    path+=`<path d="M${a.x},${a.y} C${cx1},${cy1} ${cx2},${cy2} ${b.x},${b.y}"
      stroke="rgba(11,252,206,0.5)" stroke-width="1.5" fill="none"
      stroke-dasharray="4 6" opacity="0.6"/>`;
    // Glow dots
    path+=`<circle cx="${a.x}" cy="${a.y}" r="3" fill="rgba(11,252,206,0.4)"/>`;
  }
  path+=`<circle cx="${pts[pts.length-1].x}" cy="${pts[pts.length-1].y}" r="4" fill="rgba(11,252,206,0.6)"/>`;
  svg.innerHTML = path;
}

      label:'המפגש\nהראשון', sub:'28.4.26',
      done: quotes && quotes.length>0, icon:'🎤',
      tip: quotes && quotes.length>0 ? 'יש ציטוטים' : 'לא הועלה'
    },
    {
      label:'5 מפגשים\nידע וכלים', sub:'2-6',
      done:true, icon:'🧠',
      tip:'מחקר, תוצרים, דאטה, אוטומציות'
    },
    {
      label:'רפלקציה\nסופית', sub: reflection ? 'הוגשה ✓' : 'ממתינה',
      done: !!reflection, icon: reflection ? '✅' : '🔒',
      tip: reflection ? reflection.topTools : 'טרם הוגשה'
    },
  ];

  const stepsHtml = steps.map((s,i)=>`
    <div class="pmj-step" title="${s.tip}">
      <div class="pmj-orb ${s.done?'done':i===3?'locked':''}">${s.icon}</div>
      <div class="pmj-step-label">${s.label.replace('\n','<br>')}</div>
      <div class="pmj-step-sub">${s.sub}</div>
    </div>`).join('');

  return `<div class="pmj-wrap">
    <div class="pmj-bg"></div>
    <div class="pmj-title">// מסלול ההתפתחות האישי שלי</div>
    <div class="pmj-track">${stepsHtml}</div>
  </div>`;
}

function openMeetingModal(num){
  const m = MEETINGS.find(x => String(x.num) === String(num));
  if(!m) return;
  const termsHtml = m.terms.map(t=>`<span class="term-chip">${t}</span>`).join('');
  const toolsHtml = m.tools.map(t=>`
    <div class="tool-row">
      <div class="tool-icon">🔧</div>
      <div><div class="tool-name">${t.name}</div><div class="tool-desc">${t.desc}</div></div>
    </div>`).join('');
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'meeting-modal';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="modal-close" onclick="closeMeetingModal()">✕</div>
      <div class="modal-header">
        <div class="modal-num">${m.label} · ${m.date}</div>
        <div class="modal-title">${m.icon} ${m.title}</div>
      </div>
      <p style="font-size:13px;color:rgba(247,245,250,.7);line-height:1.7;margin-bottom:4px">${m.summary}</p>
      <div class="modal-section-label">// מונחים מרכזיים</div>
      <div class="terms-wrap">${termsHtml}</div>
      ${m.tools.length ? `<div class="modal-section-label">// כלים שעבדנו עליהם</div>${toolsHtml}` : ''}
    </div>`;
  modal.addEventListener('click', e=>{ if(e.target===modal) closeMeetingModal(); });
  document.body.appendChild(modal);
  document.addEventListener('keydown', escModal);
}
function closeMeetingModal(){
  const m = document.getElementById('meeting-modal');
  if(m) m.remove();
  document.removeEventListener('keydown', escModal);
}
function escModal(e){ if(e.key==='Escape') closeMeetingModal(); }
